#{?mouse,#[bg=red]µ#[default],}
#[default]#[default]#[noreverse]%A %d %B#[reverse]%H:%M'
set -g status-left '#[bg=colour#(cut -f1 -d" " ~/logs/zz/idc.log),fg=#(cut -f3 -d" " ~/logs/zz/idc.log)]#(whoami)#[reverse]#(head -c9 ~/logs/zz/model.log|tr -d "\n ")#[noreverse]#(cut -f4 -d"." ~/logs/zz/wlan.log)#{?mouse,#[bg=darkslategray fg=orange] m ,}'
# WINDOW INDICATORS
# set -g window-status-separator '|'
# set -g window-status-separator '!'
set -g window-status-format '#{?#{!=:#T,localhost},#T,}#P#{?#{window_zoomed_flag},-, }│#P-%U-#W '
# set -g status-style '#[bg=colour#(cut -f1 -d" " ~/logs/zz/idc.log)]'
# fg=colour45,bg=black
set -g window-status-activity-style fg=colour4,bg=colour8,bold
set -g window-status-bell-style fg=colour10,bg=colour9,bold
set -g window-status-current-format '#[noreverse]#[fg=233,bg=7]#[nodim]#(date +%%^A#[dim]-#[dim]%%d#[nodim]-#[dim]%%m#[nodim]\|#[nodim]%%H#[dim]:#[nodim]%%M#[dim]:#[nodim]%%S)#[bg=colour0#(cat ~/logs/zz/b/bcolor.log;)] #(cat ~/logs/zz/b/bp.log)#[fg=colour#(grep -qe "DISCHARGING" ~/logs/zz/b/battery.log && echo "7" || echo "42";),dim]#([ -s ~/logs/zz/b/bp.log ] && printf %%b "%%") #[bg=0,fg=colour#(printf %%b "$((#{pane_index}*2+5))")]#[reverse] #P #[nobold]#{?client_prefix,#[fg=0 bg=orange]  @  ,}#[fg=0,bg=colour#{pane_index}]#[bold]#{?#{window_zoomed_flag}, #W #[reverse] #P ,}#[bg=0,fg=colour#(printf %%b "$((#{pane_width}+2*2))")]#[reverse] #{pane_width} '
# set -g window-status-format 'o#[bg=0,fg=colour%H]%H#[fg=7,dim]|#[fg=colour%M]%M#[fg=7,dim]|#[fg=colour%S]%S #{?mouse,#[bg=darkslategray fg=orange] µ }#[default]'
set -g window-status-current-style fg=colour44,bg=colour240,bold
set -g status-right '#[bg=colour#(cut -f1 -d" " ~/logs/zz/idc.log),fg=#(cut -f3 -d" " ~/logs/zz/idc.log)]#[reverse]#(ps -A o %%mem,comm --sort %%mem|tail -n2|sed -e "s/\d.*\/.*\///g" -e "s/^.//g" -e "s/\ /:/g"|tac|tr -s "\n" ","|sed -e "s/,$//" -e "s/\,/\#\[fg=0\]|/g")'
#[bg=7]#[dim]#(date +%%^A#[nodim]-#[dim]%%d#[nodim]-#[dim]%%m#[nodim]\|#[nodim]%%H#[dim]:#[nodim]%%M#[dim]:#[nodim]%%S)

